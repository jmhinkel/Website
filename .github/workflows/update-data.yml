name: Update gold dashboard data

# Runs on GitHub's servers (no browser, no CORS), fetches prices,
# and commits data.json back to the repo. The dashboard reads that file.

on:
  schedule:
    # Hourly during US market hours, weekdays (times in UTC).
    # 13:00–21:00 UTC ≈ 9am–5pm ET. Adjust if you like.
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch:    # lets you run it manually from the Actions tab
  push:
    branches: [ main ]  # also refresh on every push

permissions:
  contents: write       # needed so the Action can commit data.json

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch market data
        run: python scripts/fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update market data [skip ci]"
          git push
